name: Daily GitHub Blogger

on:
  schedule:
    # UTC 00:00 = 北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manual trigger for testing
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v

      - name: Run doctor
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python run.py doctor

      - name: Run quality-gate
        run: python run.py quality-gate

      - name: Run benchmark
        run: python run.py benchmark

  daily:
    needs: test
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: python run.py daily

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit state files, not reports or content packs
          if git diff --quiet data/state/; then
            echo "No state changes to commit."
          else
            git add data/state/
            git commit -m "chore: update state [skip ci]"
            git push
          fi
